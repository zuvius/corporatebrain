version: '3.8'

services:
  postgres:
    image: ankane/pgvector:latest
    container_name: corporate-brain-db
    environment:
      POSTGRES_USER: corp_brain
      POSTGRES_PASSWORD: corpbrain123
      POSTGRES_DB: corporate_brain
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U corp_brain -d corporate_brain"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: corporate-brain-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
